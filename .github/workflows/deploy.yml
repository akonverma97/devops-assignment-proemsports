name: CI/CD with Manual Issue Approval

on:
  push:
    branches: [main]  # build triggers on push
  issue_comment:
    types: [created]  # deploy triggers on comment

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push service-a
        run: |
          IMAGE=${IMAGE_NAME}:${{ github.sha }}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE ./service-a
          docker push $IMAGE
      - name: Save image tag
        id: save-image
        run: echo "IMAGE_TAG=${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_OUTPUT

  deploy:
    if: github.event_name == 'issue_comment'  # deploy triggers only on comment
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Check comment for approval
        id: check
        run: |
          COMMENT="${{ github.event.comment.body,, }}"
          echo "Comment received: $COMMENT"
          if [[ ! "$COMMENT" =~ approve|done|continue ]]; then
            echo "Not an approval comment. Exiting."
            exit 1
          fi
      - name: Deploy to Kubernetes
        run: |
          IMAGE=${{ needs.build.outputs.IMAGE_TAG }}
          echo "Deploying image: $IMAGE"
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/service-a service-a=$IMAGE
          kubectl rollout status deployment/service-a --timeout=120s
      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=ready pod -l app=service-a --timeout=120s
          kubectl get pods
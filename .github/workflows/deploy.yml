name: CI/CD with Manual Approval

on:
  push:
    branches: [main]   # Build triggers automatically on push
  workflow_dispatch:    # Optional manual workflow trigger

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-app

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-image.outputs.IMAGE_TAG }}  # Export build output
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push service-a
        id: set-image
        run: |
          IMAGE=${IMAGE_NAME}:${GITHUB_SHA}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE ./service-a
          docker push $IMAGE
          echo "IMAGE_TAG=$IMAGE" >> $GITHUB_OUTPUT

  approval:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_tag: ${{ needs.build.outputs.image_tag }}  # Forward build output to deploy
    steps:
      - name: Wait for manual approval
        uses: hmarr/auto-approve-action@v2
        with:
          message: "Please approve deployment to continue"

  deploy:
    runs-on: self-hosted
    needs: approval
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Kubernetes
        run: |
          IMAGE=${{ needs.approval.outputs.image_tag }}
          echo "Deploying image: $IMAGE"
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/service-a service-a=$IMAGE
          kubectl rollout status deployment/service-a --timeout=120s

      - name: Wait for Pods to be Ready
        run: |
          kubectl wait --for=condition=ready pod -l app=service-a --timeout=120s
          kubectl get pods

      - name: Verify deployment
        run: |
          POD=$(kubectl get pod -l app=service-a -o jsonpath="{.items[0].metadata.name}")
          echo "Using pod: $POD"
          kubectl port-forward pod/$POD 5000:5000 > /dev/null 2>&1 &
          sleep 5
          curl --fail http://localhost:5000/health
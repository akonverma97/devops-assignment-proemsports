name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push service-a
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest ./service-a
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    runs-on: self-hosted        # ← runs on your Mac
    needs: build                # ← waits for build job to finish

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to local Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout restart deployment/service-a
          kubectl rollout status deployment/service-a --timeout=60s

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl port-forward svc/service-a 5000:5000 &
          sleep 3
          curl http://localhost:5000/health
name: Issue Comment Deploy

on:
  issue_comment:
    types: [created]  # Trigger only on new comment

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push service-a
        run: |
          IMAGE=${IMAGE_NAME}:${{ github.sha }}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE ./service-a
          docker push $IMAGE

  check-approval:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      approved: ${{ steps.set-approval.outputs.approved }}
    steps:
      - name: Check if comment approves deploy
        id: set-approval
        run: |
          COMMENT="${GITHUB_EVENT_COMMENT_BODY,,}"   # convert to lowercase
          APPROVED="false"
          if [[ "$COMMENT" =~ approve|done|continue ]]; then
            APPROVED="true"
          fi
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT

  deploy:
    runs-on: self-hosted
    needs: check-approval
    if: needs.check-approval.outputs.approved == 'true'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Kubernetes
        run: |
          IMAGE=${IMAGE_NAME}:${{ github.sha }}
          echo "Deploying image: $IMAGE"
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/service-a service-a=$IMAGE
          kubectl rollout status deployment/service-a --timeout=120s
      - name: Wait for Pods to be Ready
        run: |
          kubectl wait --for=condition=ready pod -l app=service-a --timeout=120s
          kubectl get pods
      - name: Verify deployment
        run: |
          POD=$(kubectl get pod -l app=service-a -o jsonpath="{.items[0].metadata.name}")
          echo "Using pod: $POD"
          kubectl port-forward pod/$POD 5000:5000 > /dev/null 2>&1 &
          sleep 5
          curl --fail http://localhost:5000/health
name: CI/CD with Issue Approval

on:
  push:
    branches: [main]  # Build on push

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push service-a
        run: |
          IMAGE=${IMAGE_NAME}:${{ github.sha }}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE ./service-a
          docker push $IMAGE

  wait-for-approval:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Wait for manual approval via issue comment
        id: check
        run: |
          echo "Waiting for approval comment..."
          # Loop to check issue comments using GitHub CLI (gh)
          APPROVED="false"
          ISSUE_NUMBER=1  # Replace with your issue number
          for i in {1..60}; do
            COMMENTS=$(gh issue view $ISSUE_NUMBER --json comments --jq '.comments[].body' 2>/dev/null)
            if echo "$COMMENTS" | grep -iqE "approve|done|continue"; then
              APPROVED="true"
              break
            fi
            echo "Not approved yet, checking again in 10s..."
            sleep 10
          done
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT

  deploy:
    runs-on: self-hosted
    needs: wait-for-approval
    if: needs.wait-for-approval.outputs.approved == 'true'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Kubernetes
        run: |
          IMAGE=${IMAGE_NAME}:${{ github.sha }}
          echo "Deploying image: $IMAGE"
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/service-a service-a=$IMAGE
          kubectl rollout status deployment/service-a --timeout=120s
      - name: Wait for Pods to be Ready
        run: |
          kubectl wait --for=condition=ready pod -l app=service-a --timeout=120s
          kubectl get pods
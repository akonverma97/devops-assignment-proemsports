version: '3'

services:
  service-a:
    build: ./service-a
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DB_PASSWORD=${DB_PASSWORD}

  service-b:
    build: ./service-b
    depends_on:
      - service-a
    environment:
      - SERVICE_A_URL=http://service-a:5000
